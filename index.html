<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    
    
        <!-- switch dark/light mode -->
        <div class="switcContainer">
        <b style="font-size: 20px;">Dark Mode:</b>
        <label class="switch">
            <input type="checkbox" id="modeToggle">
            <span class="slider"></span>
        </label>
        </div>
    
    
    
    <div id="header"></div>
    <div id="content"></div>
    <div id="footer"></div>

    <script>
        fetch('pages/headerFooter/header.html').then(r => r.text()).then(h => document.getElementById('header').innerHTML = h);
        fetch('pages/headerFooter/footer.html').then(r => r.text()).then(f => document.getElementById('footer').innerHTML = f);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
